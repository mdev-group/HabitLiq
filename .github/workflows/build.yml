name: Build iOS App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Build Application Binary Using SPM
      run: |
        cd LiquidGlassHabit
        swift build -c release --triple arm64-apple-ios

    - name: Package into App Bundle Structure
      run: |
        cd LiquidGlassHabit
        mkdir -p Payload/LiquidGlassHabit.app
        cp .build/arm64-apple-ios/release/LiquidGlassHabit Payload/LiquidGlassHabit.app/LiquidGlassHabit
        echo '<?xml version="1.0" encoding="UTF-8"?><!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd"><plist version="1.0"><dict><key>CFBundleExecutable</key><string>LiquidGlassHabit</string><key>CFBundleIdentifier</key><string>com.mdev.LiquidGlassHabit</string><key>CFBundleName</key><string>LiquidGlassHabit</string><key>CFBundlePackageType</key><string>APPL</string><key>CFBundleShortVersionString</key><string>1.0</string></dict></plist>' > Payload/LiquidGlassHabit.app/Info.plist
        zip -r ../LiquidGlassHabit.ipa Payload

    - name: Upload Finished App Binary
      uses: actions/upload-artifact@v4
      with:
        name: LiquidGlassHabit-App
        path: LiquidGlassHabit.ipa
