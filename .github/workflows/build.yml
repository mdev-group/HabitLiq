name: Build iOS App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Select Xcode Developer Tools
      run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

    - name: Build Application Binary Using SPM
      run: |
        cd LiquidGlassHabit
        SDK_PATH=$(xcrun --sdk iphoneos --show-sdk-path)
        swift build -c release \
          --triple arm64-apple-ios \
          -Xswiftc -sdk -Xswiftc "$SDK_PATH" \
          -Xcc -isysroot -Xcc "$SDK_PATH" \
          -Xlinker -syslibroot -Xlinker "$SDK_PATH"

    - name: Package into App Bundle Structure
      run: |
        cd LiquidGlassHabit
        mkdir -p Payload/LiquidGlassHabit.app
        cp .build/arm64-apple-ios/release/LiquidGlassHabit Payload/LiquidGlassHabit.app/LiquidGlassHabit
        
        cat << 'EOF' > Payload/LiquidGlassHabit.app/Info.plist
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
            <key>CFBundleExecutable</key>
            <string>LiquidGlassHabit</string>
            <key>CFBundleIdentifier</key>
            <string>com.mdev.LiquidGlassHabit</string>
            <key>CFBundleName</key>
            <string>LiquidGlassHabit</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleShortVersionString</key>
            <string>1.0</string>
        </dict>
        </plist>
        EOF
        
        zip -r ../LiquidGlassHabit.ipa Payload

    - name: Upload Finished App Binary
      uses: actions/upload-artifact@v4
      with:
        name: LiquidGlassHabit-App
        path: LiquidGlassHabit.ipa
