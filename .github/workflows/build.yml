name: Build iOS App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14  # Spawns the free virtual Mac server

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Select Latest Xcode Version
      run: sudo xcode-select -s /Applications/Xcode_15.4.app

    - name: Compile and Archive App
      run: |
        xcodebuild -project HabitLiq.xcodeproj \
                   -scheme HabitLiq \
                   -sdk iphoneos \
                   -configuration Release \
                   archive -archivePath /tmp/HabitLiq.xcarchive \
                   CODE_SIGNING_ALLOWED=NO

    - name: Package into .ipa File
      run: |
        mkdir -p Payload
        cp -r /tmp/HabitLiq.xcarchive/Products/Applications/HabitLiq.app Payload/
        zip -r HabitLiq.ipa Payload

    - name: Upload Finished App Binary
      uses: actions/upload-artifact@v4
      with:
        name: HabitLiq-App
        path: HabitLiq.ipa
